services:
  - type: web
    name: salesfirst-api
    runtime: node
    rootDir: packages/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: LEMMA_OPENAI_API_KEY
        sync: false
      - key: LEMMA_OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LEMMA_OPENAI_DEFAULT_MODEL
        value: llama-3.3-70b-versatile
      - key: LEMMA_DEFAULT_MODEL_TYPE
        value: openai_compat
      - key: NEXT_PUBLIC_WEB_URL
        sync: false
